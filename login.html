<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 font-sans antialiased">
  <nav class="bg-blue-600 p-4 text-white flex justify-between">
    <div>
      <h1 class="text-3xl font-bold">AI Blog Generator</h1>
    </div>
    <div>
      <a href="#" class="text-white hover:underline">Logout</a>
    </div>
  </nav>

  <br>
  <!-- Main content -->
  <div class="flex items-center justify-center h-screen">
    <div class="bg-white p-8 shadow-md rounded-lg max-w-md w-full">
      <!-- Login form -->
      <form class="space-y-4">
        <h2 class="text-xl font-semibold">
          Login
        </h2>
        <div>
          <label for="username" class="block mb-4 font-medium"> Username</label>
          <input type="text" id="username" placeholder="Enter your username" class="w-full p-2 border rounded">
        </div>

        <div>
          <label for="password" class="block mb-4 font-medium"> Password</label>
          <input type="password" id="password" placeholder="Enter your password" class="w-full p-2 border rounded">
        </div>
        <button type="submit" class="w-full p-2 bg-blue-600 border rounded text-white hover:bg-blue-700">Login</button>
      </form>
    </div>
  </div>
    <!-- <footer class="text-center p-4 text-black mt-6 ">
    Made by yours truly, <a href="https://www.github.com/andreyp3054"></a>Andreyp3054 ^_^
  </footer>
   -->
</body>

</html>
